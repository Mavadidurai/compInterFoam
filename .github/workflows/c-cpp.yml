---
name: OpenFOAM v2406 — compInterFoam CI

"on":
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

jobs:
  build-compInterFoam:
    name: Build compInterFoam (OpenFOAM v2406)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install OpenFOAM v2406
        run: |
          sudo apt-get update
          sudo apt-get install -y openfoam2406

      - name: Show OpenFOAM environment
        shell: bash -l {0}
        run: |
          source /opt/openfoam2406/etc/bashrc
          foamVersion || true
          echo "WM_PROJECT_DIR=$WM_PROJECT_DIR"
          echo "WM_PROJECT_VERSION=$WM_PROJECT_VERSION"
          echo "WM_OPTIONS=$WM_OPTIONS"

      - name: Verify wmake availability
        shell: bash -l {0}
        run: |
          source /opt/openfoam2406/etc/bashrc
          wmake -help

      - name: Configure build flags (DP, 32-bit labels)
        shell: bash -l {0}
        run: |
          echo "WM_LABEL_SIZE=32" >> $GITHUB_ENV
          echo "WM_PRECISION_OPTION=DP" >> $GITHUB_ENV

      - name: Build compInterFoam with wmake
        shell: bash -l {0}
        env:
          WM_LABEL_SIZE: ${{ env.WM_LABEL_SIZE }}
          WM_PRECISION_OPTION: ${{ env.WM_PRECISION_OPTION }}
        run: |
          set -euo pipefail
          source /opt/openfoam2406/etc/bashrc
          echo "Using WM_LABEL_SIZE=$WM_LABEL_SIZE"
          echo "WM_PRECISION_OPTION=$WM_PRECISION_OPTION"

          # Try to locate the solver directory automatically
          SOLVER_DIR=$(git ls-files | \
            grep -E '(^|/)compInterFoam/Make/files$' | \
            sed 's#/Make/files##' | head -n1 || true)
          if [ -z "$SOLVER_DIR" ]; then
            # Fallback to common location
            SOLVER_DIR=applications/solvers/multiphase/compInterFoam
          fi
          echo "Solver directory: $SOLVER_DIR"

          if [ ! -f "$SOLVER_DIR/Make/files" ]; then
            echo "ERROR: Make/files not found in $SOLVER_DIR" >&2
            exit 2
          fi

          pushd "$SOLVER_DIR"
          wclean all || true
          set +e
          wmake -j "$(nproc)" 2>&1 | tee "$GITHUB_WORKSPACE/build.log"
          BUILD_STATUS=${PIPESTATUS[0]}
          popd
          exit $BUILD_STATUS

      - name: Locate built binary
        id: findbin
        shell: bash -l {0}
        run: |
          source /opt/openfoam2406/etc/bashrc
          BIN_PATH=$(find "$WM_PROJECT_USER_DIR" -type f \
            -path '*/platforms/*/bin/compInterFoam' | head -n1 || true)
          if [ -z "$BIN_PATH" ]; then
            echo "Binary not found under $WM_PROJECT_USER_DIR/platforms" >&2
            exit 1
          fi
          echo "bin=$BIN_PATH" >> $GITHUB_OUTPUT
          echo "Found: $BIN_PATH"

      - name: Smoke test (help only)
        shell: bash -l {0}
        run: |
          source /opt/openfoam2406/etc/bashrc
          "${{ steps.findbin.outputs.bin }}" -help | head -n 50 | \
            tee solver-help.txt

      - name: "Optional: run minimal case if present"
        if: ${{ hashFiles('cases/minimal/system/controlDict') != '' }}
        shell: bash -l {0}
        run: |
          source /opt/openfoam2406/etc/bashrc
          BIN="${{ steps.findbin.outputs.bin }}"
          cd cases/minimal
          blockMesh || true
          "$BIN" -case . -help > ../minimal-run.txt || true

      - name: Upload artifacts (binary + logs)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compInterFoam-v2406-${{ github.sha }}
          path: |
            ${{ steps.findbin.outputs.bin }}
            build.log
            solver-help.txt
            cases/minimal/constant
            cases/minimal/system
            cases/minimal/0*
          if-no-files-found: warn

  cppcheck:
    name: Quick static check (headers/sources only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install cppcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y cppcheck
      - name: Run cppcheck (non-fatal; ignore missing OpenFOAM includes)
        continue-on-error: true
        run: |
          if ls **/*.{C,cc,cpp,cxx,h,H,HH,hxx} >/dev/null 2>&1; then
            cppcheck \
              --enable=warning,performance,portability,style \
              --inline-suppr \
              --suppress=missingIncludeSystem \
              --template=gcc \
              . || true
          else
            echo "No C/C++ files found; skipping."
          fi
